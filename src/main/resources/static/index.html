<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bills</title>
    <link rel="stylesheet" href="/app.css">
</head>
<body>
<main class="page">
    <section class="hero">
        <p class="eyebrow">Bills</p>
        <h1>账单导入</h1>
        <p class="subtitle">
            上传 CSV、XLS 或 XLSX 文件，系统会校验表头并写入内嵌 H2 数据库。
        </p>
    </section>

    <section class="card">
        <h2>上传文件</h2>
        <form id="import-form">
            <label class="upload-box">
                <span class="upload-title">选择账单文件</span>
                <span class="upload-hint">支持格式：.csv、.xls、.xlsx</span>
                <input id="file-input" name="file" type="file" accept=".csv,.xls,.xlsx" required>
            </label>
            <div class="actions">
                <button id="submit-button" type="submit">开始导入</button>
                <span id="file-name" class="file-name">尚未选择文件</span>
            </div>
        </form>
        <div id="result" class="result" aria-live="polite"></div>
    </section>

    <div class="guide">
        <section>
            <h2>导入表头</h2>
            <p>文件第一行需要包含以下列名，顺序不限：</p>
            <code>账本, 分类, 子分类, 货币, 金额, 账户, 记录人, 日期, 时间, 标签, 备注, 收支</code>
        </section>
        <section>
            <h2>内嵌运行</h2>
            <p>前端页面、接口服务和 H2 数据库都随 Spring Boot Jar 启动，无需单独部署前端或数据库。</p>
        </section>
    </div>
</main>
<script src="/app.js"></script>
</body>
</html>
